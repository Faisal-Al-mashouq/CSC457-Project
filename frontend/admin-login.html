<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دخول المشرف | Discover Saudi Arabia</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="login" class="admin-body">
  <main class="admin-login-screen">
    <section class="login-art">
      <a class="brand" href="index.html">
        <span class="brand-mark">د</span>
        <span>
          <strong>Discover Saudi Arabia</strong>
          <small>اكتشف السعودية</small>
        </span>
      </a>
      <h1>بوابة إدارة المحتوى الثقافي</h1>
      <p>تسجيل دخول المشرف لإضافة وتحديث وحذف بيانات المناطق والمعالم.</p>
      <div class="login-note">
        <strong>بيانات التجربة</strong>
        <span>اسم المستخدم: admin</span>
        <span>كلمة المرور: 12345</span>
      </div>
    </section>

    <section class="login-panel">
      <form id="loginForm" class="form-card" novalidate>
        <span class="eyebrow">منطقة المشرف</span>
        <h2>تسجيل الدخول</h2>
        <div id="loginMessage" class="message error hidden"></div>

        <label>
          اسم المستخدم
          <input id="username" name="username" type="text" placeholder="ادخل اسم المستخدم" autocomplete="username" />
          <small class="field-error"></small>
        </label>

        <label>
          كلمة المرور
          <input id="password" name="password" type="password" placeholder="ادخل كلمة المرور" autocomplete="current-password" />
          <small class="field-error"></small>
        </label>

        <button class="btn primary full" type="submit">دخول</button>
        <a class="text-link" href="index.html">العودة إلى الموقع</a>
      </form>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
