<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <title>اكتشف السعودية - دخول المشرف</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/app.js" defer></script>
</head>
<body>
  <header class="site-header">
    <nav class="nav container">
      <a class="logo" href="index.html"><span class="logo-mark">س</span>اكتشف السعودية</a>
      <div class="nav-links">
        <a href="index.html">الرئيسية</a>
        <a href="regions.html">المناطق</a>
        <a href="admin-login.html">دخول المشرف</a>
        <button id="themeToggle" class="theme-btn" type="button">الوضع الليلي</button>
      </div>
    </nav>
  </header>

  <main class="container login-page">
    <section class="form-card login-card">
      <span class="section-label">منطقة المشرف</span>
      <h1>تسجيل الدخول</h1>
      <p class="hint">يرجى إدخال بيانات المشرف للمتابعة.</p>

      <form id="loginForm" novalidate>
        <label for="username">اسم المستخدم</label>
        <input id="username" type="text" placeholder="اكتب اسم المستخدم" />

        <label for="password">كلمة المرور</label>
        <input id="password" type="password" placeholder="اكتب كلمة المرور" />

        <p id="loginError" class="error-message"></p>
        <button class="btn btn-primary full" type="submit">دخول</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2026 اكتشف السعودية - جامعة الملك سعود</p>
    </div>
  </footer>
</body>
</html>
