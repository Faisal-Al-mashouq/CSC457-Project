<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <title>اكتشف السعودية - تحديث المحتوى</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/app.js" defer></script>
</head>
<body data-admin="protected">
  <header class="site-header">
    <nav class="nav container">
      <a class="logo" href="admin-dashboard.html"><span class="logo-mark">س</span>اكتشف السعودية</a>
      <div class="nav-links">
        <a href="index.html">الموقع</a>
        <a href="admin-dashboard.html">لوحة التحكم</a>
        <a href="admin-add.html">إضافة محتوى</a>
        <button id="themeToggle" class="theme-btn" type="button">الوضع الليلي</button>
        <button class="theme-btn logout-btn" type="button">خروج</button>
      </div>
    </nav>
  </header>

  <main class="container section form-page">
    <section class="form-card wide-form">
      <span class="section-label">تعديل سجل</span>
      <h1>تحديث المحتوى</h1>
      <p class="hint">عدّل البيانات ثم اضغط حفظ التعديلات.</p>

      <form id="editForm" class="content-form" novalidate>
        <label for="title">اسم المكان</label>
        <input id="title" type="text" placeholder="مثال: الرياض" />

        <label for="region">المنطقة</label>
        <input id="region" type="text" placeholder="مثال: منطقة الرياض" />

        <label for="category">التصنيف</label>
        <select id="category">
          <option value="">اختر التصنيف</option>
          <option value="مدينة">مدينة</option>
          <option value="تاريخية">تاريخية</option>
          <option value="ساحلية">ساحلية</option>
          <option value="جبلية">جبلية</option>
        </select>

        <label for="shortText">وصف قصير</label>
        <input id="shortText" type="text" placeholder="جملة مختصرة تظهر في البطاقة" />

        <label for="description">معلومات تفصيلية</label>
        <textarea id="description" rows="5" placeholder="اكتب معلومات تاريخية أو ثقافية عن المكان"></textarea>

        <label for="landmarks">المعالم</label>
        <input id="landmarks" type="text" placeholder="اكتب المعالم وافصل بينها بعلامة ،" />

        <label for="image">رابط الصورة أو اسم ملف الصورة</label>
        <input id="image" type="text" placeholder="مثال: assets/riyadh.jpg" />
        <p id="formError" class="error-message"></p>
        <button class="btn btn-primary full" type="submit">حفظ التعديلات</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© 2026 اكتشف السعودية - جامعة الملك سعود</p>
    </div>
  </footer>
</body>
</html>
